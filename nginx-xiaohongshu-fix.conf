server {
    listen 80;
    server_name www.wubug.cc wubug.cc;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.wubug.cc wubug.cc;

    # SSL 证书
    ssl_certificate /etc/letsencrypt/live/www.wubug.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.wubug.cc/privkey.pem;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # SSL 兼容性设置（支持旧版浏览器）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ecdh_curve X25519:P-256:P-384;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA';
    ssl_session_cache shared:le_nginx_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_session_tickets off;

    # 日志
    access_log /var/log/nginx/unified-web.access.log;
    error_log /var/log/nginx/unified-web.error.log;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 小红书 API (修复 HTTP/2 代理问题)
    location /xiaohongshu/api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_next_upstream_timeout 60s;
        proxy_next_upstream_tries 2;
        proxy_http_version 1.1;

        # HTTP/2 代理修复 - 使用固定的头
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 禁用缓冲和请求缓存
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;

        # 不拦截后端错误
        proxy_intercept_errors off;
        proxy_ignore_client_abort on;
    }

    # 小红书前端
    location /xiaohongshu/ {
        alias /var/www/xiaohongshu-web/admin/public/;
        index index.html;
        try_files $uri $uri/ /xiaohongshu/index.html;
    }

    # 武霸哥API
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /openid/report {
        proxy_pass http://localhost:3000;
    }

    # 财务系统
    location /finance/ {
        alias /var/www/finance/;
        index index.html;
        try_files $uri $uri/ /finance/index.html;
    }

    # 武霸哥前端 - Vue Router history模式支持
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
